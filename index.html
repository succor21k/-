<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>근무표 매니저</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS for Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        .shift-D { background-color: #d1fae5; color: #065f46; border-color: #34d399; }
        .shift-E { background-color: #fef3c7; color: #92400e; border-color: #fbbf24; }
        .shift-N { background-color: #fee2e2; color: #991b1b; border-color: #f87171; }
        .shift-O { background-color: #f3f4f6; color: #374151; border-color: #d1d5db; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day-cell { min-height: 70px; transition: all 0.2s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .day-cell:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col">
        <!-- 헤더 -->
        <div class="bg-indigo-700 p-5 text-white shadow-md">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold">2026년 5월 근무표</h1>
                <div class="flex gap-2">
                    <button onclick="document.getElementById('excelUpload').click()" class="text-xs bg-green-600 hover:bg-green-700 px-3 py-2 rounded font-bold transition">엑셀 열기</button>
                    <button onclick="saveToExcel()" class="text-xs bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded font-bold transition">엑셀 저장</button>
                    <input type="file" id="excelUpload" accept=".xlsx, .xls" class="hidden" onchange="handleFileUpload(event)">
                </div>
            </div>
            
            <div>
                <label class="text-xs opacity-75">근무자 선택</label>
                <select id="nameSelect" class="w-full mt-1 p-3 bg-white text-gray-900 rounded-lg shadow font-bold outline-none" onchange="renderApp()">
                    <!-- Options populated dynamically -->
                </select>
            </div>
        </div>

        <!-- 대시보드 (통계) -->
        <div id="statsArea" class="grid grid-cols-4 gap-2 p-4 bg-indigo-50 border-b">
            <!-- 통계 자동 삽입 -->
        </div>

        <!-- 안내문구 -->
        <div class="px-4 py-2 text-center flex flex-col gap-1">
            <p id="fileStatus" class="text-xs text-red-500 font-bold">⚠️ 상단의 '엑셀 열기'를 눌러 근무표 파일을 불러오세요.</p>
            <p class="text-xs text-gray-400 font-medium">💡 날짜를 터치하면 근무가 변경됩니다 (D→E→N→O)</p>
        </div>

        <!-- 달력 영역 -->
        <div class="p-4 flex-grow">
            <div class="grid grid-cols-7 gap-1 text-center mb-2">
                <div class="text-red-500 font-bold text-xs">일</div>
                <div class="text-gray-500 font-bold text-xs">월</div>
                <div class="text-gray-500 font-bold text-xs">화</div>
                <div class="text-gray-500 font-bold text-xs">수</div>
                <div class="text-gray-500 font-bold text-xs">목</div>
                <div class="text-gray-500 font-bold text-xs">금</div>
                <div class="text-blue-500 font-bold text-xs">토</div>
            </div>
            <div id="calendar" class="grid grid-cols-7 gap-1 text-center">
                <!-- 달력 날짜 자동 삽입 -->
            </div>
        </div>

        <!-- 하단 정보 -->
        <div class="p-4 text-[10px] text-gray-400 border-t bg-gray-50">
            * D: 8h, E: 8.5h, N: 11.5h 기준으로 자동 계산됩니다.<br>
            * 원본 엑셀 파일을 열고, 수정한 뒤 엑셀 저장을 누르시면 새로운 엑셀 파일이 다운로드됩니다.
        </div>
    </div>

    <script>
        let workbook = null;
        let sheetName = null;
        let currentData = {};
        let nameRowMap = {};

        // 엑셀 파일 불러오기
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    workbook = XLSX.read(data, {type: 'array', cellDates: true, cellNF: false, cellText: false});
                    sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    
                    currentData = {};
                    nameRowMap = {};
                    
                    const range = XLSX.utils.decode_range(worksheet['!ref']);
                    
                    // Col B(1)에 숫자가 있고 Col C(2)에 이름이 있는 행 찾기
                    for(let R = range.s.r; R <= range.e.r; ++R) {
                        const numCell = worksheet[XLSX.utils.encode_cell({r: R, c: 1})];
                        if (numCell && typeof numCell.v === 'number') {
                            const nameCell = worksheet[XLSX.utils.encode_cell({r: R, c: 2})];
                            if (nameCell && nameCell.v) {
                                const name = String(nameCell.v).trim();
                                nameRowMap[name] = R;
                                currentData[name] = [];
                                
                                // D(3) ~ AH(33) 열까지 31일치 근무 추출
                                for(let C = 3; C <= 33; ++C) {
                                    const shiftCell = worksheet[XLSX.utils.encode_cell({r: R, c: C})];
                                    currentData[name].push(shiftCell && shiftCell.v ? String(shiftCell.v).trim() : 'O');
                                }
                            }
                        }
                    }

                    if (Object.keys(currentData).length > 0) {
                        document.getElementById('fileStatus').innerText = "✅ 엑셀 파일이 성공적으로 로드되었습니다.";
                        document.getElementById('fileStatus').className = "text-xs text-green-600 font-bold";
                        updateNameSelect();
                        renderApp();
                    } else {
                        alert("근무자 데이터를 찾을 수 없습니다. 엑셀 파일 형식을 확인해주세요.");
                    }
                } catch (error) {
                    alert("엑셀 파일을 읽는 중 오류가 발생했습니다.");
                    console.error(error);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // 셀렉트 박스 업데이트
        function updateNameSelect() {
            const select = document.getElementById('nameSelect');
            select.innerHTML = '';
            
            Object.keys(currentData).forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.innerText = name;
                select.appendChild(option);
            });
        }

        // 엑셀로 저장 (다운로드)
        function saveToExcel() {
            if (!workbook || Object.keys(currentData).length === 0) {
                alert("먼저 상단의 '엑셀 열기'를 눌러 파일을 불러와주세요.");
                return;
            }

            const worksheet = workbook.Sheets[sheetName];

            // 변경된 currentData를 워크시트에 반영
            for (const [name, rowIdx] of Object.entries(nameRowMap)) {
                const shifts = currentData[name];
                for(let i = 0; i < shifts.length; i++) {
                    const cIdx = i + 3; // Col D(3)부터 시작
                    const cellAddress = XLSX.utils.encode_cell({r: rowIdx, c: cIdx});
                    let cell = worksheet[cellAddress];
                    
                    if (!cell) {
                        XLSX.utils.sheet_add_aoa(worksheet, [[shifts[i]]], {origin: cellAddress});
                    } else {
                        cell.v = shifts[i];
                    }
                }
            }

            // 파일 다운로드 트리거
            XLSX.writeFile(workbook, "근무표_수정본.xlsx");
        }

        // 근무 순환 변경 (D -> E -> N -> O)
        function toggleShift(name, index) {
            if(!currentData[name]) return;
            
            const shifts = currentData[name];
            const current = shifts[index];
            let next = "D";
            
            if (current === "D") next = "E";
            else if (current === "E") next = "N";
            else if (current === "N") next = "O";
            else next = "D";

            shifts[index] = next;
            renderApp();
        }

        function renderApp() {
            const select = document.getElementById('nameSelect');
            if(!select.value) return;
            
            const name = select.value;
            const shifts = currentData[name];
            
            if(!shifts) return;
            
            // 통계 계산
            let dCount = 0, eCount = 0, nCount = 0, totalTime = 0;
            shifts.forEach(s => {
                if(s === "D") { dCount++; totalTime += 8; }
                if(s === "E") { eCount++; totalTime += 8.5; }
                if(s === "N") { nCount++; totalTime += 11.5; }
            });

            const statsArea = document.getElementById('statsArea');
            statsArea.innerHTML = `
                <div class="bg-white p-2 rounded shadow-sm text-center border-b-4 border-green-400">
                    <div class="text-[10px] text-gray-500">Day</div>
                    <div class="font-bold text-lg">${dCount}</div>
                </div>
                <div class="bg-white p-2 rounded shadow-sm text-center border-b-4 border-yellow-400">
                    <div class="text-[10px] text-gray-500">Eve</div>
                    <div class="font-bold text-lg">${eCount}</div>
                </div>
                <div class="bg-white p-2 rounded shadow-sm text-center border-b-4 border-red-400">
                    <div class="text-[10px] text-gray-500">Night</div>
                    <div class="font-bold text-lg">${nCount}</div>
                </div>
                <div class="bg-white p-2 rounded shadow-sm text-center border-b-4 border-indigo-400">
                    <div class="text-[10px] text-gray-500">총 시간</div>
                    <div class="font-bold text-lg">${totalTime}h</div>
                </div>
            `;

            // 달력 렌더링
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';
            
            // 2026년 5월 1일은 금요일 (index 5)
            for(let i=0; i<5; i++) {
                calendar.appendChild(document.createElement('div'));
            }

            shifts.forEach((s, i) => {
                const dayCell = document.createElement('div');
                // s 값이 잘못되어도 기본 shift-O 스타일 적용되도록 안전 처리
                const validShift = ['D','E','N','O'].includes(s) ? s : 'O';
                dayCell.className = `day-cell border rounded-lg p-1 flex flex-col items-center justify-between shadow-sm shift-${validShift}`;
                dayCell.onclick = () => toggleShift(name, i);
                
                dayCell.innerHTML = `
                    <span class="text-[10px] font-medium opacity-60">${i+1}</span>
                    <span class="text-xl font-black">${s}</span>
                    <span class="text-[8px] opacity-0">.</span>
                `;
                calendar.appendChild(dayCell);
            });
        }
    </script>
</body>
</html>
